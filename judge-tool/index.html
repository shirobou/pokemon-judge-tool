<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケカ ジャッジ ターン管理ツール</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>ポケカ ジャッジ ターン管理</h1>
            <div id="turn-display">
                <span id="current-turn-label">先攻 1ターン目</span>
                <button id="btn-next-turn" class="btn btn-primary">ターン終了 →</button>
                <button id="btn-undo-turn" class="btn btn-secondary" disabled>← 戻す</button>
                <button id="btn-reset" class="btn btn-danger">リセット</button>
            </div>
        </header>

        <!-- 編集モードバナー -->
        <div id="editing-banner" class="hidden">
            <span id="editing-label"></span>
            <div class="editing-buttons">
                <button id="btn-save-edit" class="btn btn-primary">保存</button>
                <button id="btn-cancel-edit" class="btn btn-secondary">キャンセル</button>
            </div>
        </div>

        <main>
            <!-- 1回制限アクション -->
            <section id="once-per-turn">
                <h2>1ターン1回の行動</h2>
                <div class="action-grid">
                    <div class="action-card" data-action="supporter">
                        <div class="action-icon">🃏</div>
                        <div class="action-name">サポート</div>
                        <div class="action-status">未使用</div>
                        <input type="text" class="action-detail" placeholder="カード名（任意）">
                    </div>
                    <div class="action-card" data-action="energy">
                        <div class="action-icon">⚡</div>
                        <div class="action-name">エネルギー</div>
                        <div class="action-status">未使用</div>
                        <input type="text" class="action-detail" placeholder="種類（任意）">
                    </div>
                    <div class="action-card" data-action="retreat">
                        <div class="action-icon">🔄</div>
                        <div class="action-name">にげる</div>
                        <div class="action-status">未使用</div>
                        <input type="text" class="action-detail" placeholder="メモ（任意）">
                    </div>
                    <div class="action-card" data-action="stadium">
                        <div class="action-icon">🏟️</div>
                        <div class="action-name">スタジアム</div>
                        <div class="action-status">未使用</div>
                        <input type="text" class="action-detail" placeholder="カード名（任意）">
                    </div>
                    <div class="action-card wide" data-action="attack">
                        <div class="action-icon">⚔️</div>
                        <div class="action-name">ワザ（ターン終了）</div>
                        <div class="action-status">未使用</div>
                        <input type="text" class="action-detail" placeholder="ワザ名（任意）">
                    </div>
                </div>
            </section>

            <!-- 先攻1ターン目制限 -->
            <div id="first-turn-notice" class="notice">
                ⚠️ 先攻1ターン目：サポート使用不可・ワザ使用不可
            </div>

            <!-- バトルフィールド -->
            <section id="field-section">
                <div id="swap-hint" class="notice hidden">🔄 入れ替え先のスロットをタップしてください（キャンセル：もう一度タップ）</div>
                <h2>バトル場</h2>
                <div id="active-area">
                    <div class="field-slot" data-slot="active">
                        <input type="text" id="active-pokemon" class="field-input active" placeholder="バトルポケモン">
                        <button class="slot-btn slot-swap" title="入れ替え">↔</button>
                        <button class="slot-btn slot-clear" title="クリア">×</button>
                    </div>
                </div>

                <h2>
                    ベンチ
                    <label class="bench-toggle">
                        <input type="checkbox" id="bench-expand">
                        ゼロの大空洞（8枠）
                    </label>
                </h2>
                <div id="bench-area"></div>
            </section>

            <!-- メモ -->
            <section id="notes-section">
                <h2>メモ</h2>
                <textarea id="turn-notes" placeholder="このターンのメモ（特性の使用回数など）"></textarea>
            </section>
        </main>

        <!-- ログ -->
        <aside id="log-panel">
            <h2>ターンログ</h2>
            <div id="log-entries"></div>
        </aside>
    </div>

    <script src="app.js"></script>
</body>
</html>
